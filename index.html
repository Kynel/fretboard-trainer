<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프렛보드 트레이너</title>
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="page-shell" data-layout="full">
      <main class="trainer-shell panel">
        <div class="trainer-top">
          <div class="mode-toggle" aria-label="학습 모드">
            <button
              class="mode-toggle__button is-active"
              type="button"
              data-mode="study"
              aria-pressed="true"
            >
              학습
            </button>
            <button
              class="mode-toggle__button"
              type="button"
              data-mode="quiz"
              aria-pressed="false"
            >
              퀴즈
            </button>
            <button
              class="mode-toggle__button"
              type="button"
              data-mode="card"
              aria-pressed="false"
            >
              카드
            </button>
          </div>
        </div>

        <section class="action-bar">
          <div class="action-bar__buttons">
            <button
              id="start-button"
              class="button button--primary button--icon"
              type="button"
              aria-label="자동 재생"
              title="자동 재생"
            >
              <i data-lucide="play" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">자동 재생</span>
            </button>
            <button
              id="pause-button"
              class="button button--ghost button--icon"
              type="button"
              aria-label="일시정지"
              title="일시정지"
            >
              <i data-lucide="pause" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">일시정지</span>
            </button>
            <button
              id="next-button"
              class="button button--secondary button--icon"
              type="button"
              aria-label="다음"
              title="다음"
            >
              <i data-lucide="skip-forward" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">다음</span>
            </button>
            <button
              id="replay-button"
              class="button button--secondary button--icon"
              type="button"
              aria-label="다시 듣기"
              title="다시 듣기"
            >
              <i data-lucide="volume-2" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">다시 듣기</span>
            </button>
            <button id="reveal-button" class="button button--ghost" type="button">
              정답 보기
            </button>
          </div>
        </section>

        <div id="card-toolbar" class="card-toolbar" hidden>
          <div class="card-toolbar__group">
            <button
              id="card-start-button"
              class="button button--primary button--small button--icon"
              type="button"
              aria-label="자동 재생"
              title="자동 재생"
            >
              <i data-lucide="play" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">자동 재생</span>
            </button>
            <button
              id="card-pause-button"
              class="button button--ghost button--small button--icon"
              type="button"
              aria-label="일시정지"
              title="일시정지"
            >
              <i data-lucide="pause" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">일시정지</span>
            </button>
            <button
              id="card-next-button"
              class="button button--secondary button--small button--icon"
              type="button"
              aria-label="다음"
              title="다음"
            >
              <i data-lucide="skip-forward" class="button__icon" aria-hidden="true"></i>
              <span class="visually-hidden">다음</span>
            </button>
          </div>
          <span id="card-interval-value" class="card-toolbar__meta">3.5초 반복</span>
        </div>

        <div class="current-target">
          <article class="note-card note-card--english">
            <span class="note-card__label">영어 음계</span>
            <strong id="english-note" class="note-card__value">-</strong>
          </article>
          <article class="note-card note-card--korean">
            <span class="note-card__label">한글 음이름</span>
            <strong id="korean-note" class="note-card__value">-</strong>
          </article>
        </div>

        <div hidden>
          <p id="round-title">지판 위치 미리보기</p>
          <p id="status-text">자동 재생을 시작하거나 다음을 눌러 연습을 시작하세요.</p>
          <strong id="position-text">선택된 위치 없음</strong>
          <span id="sound-status">시작 버튼으로 준비</span>
        </div>

        <div class="fretboard-stage">
          <svg
            id="fretboard-svg"
            viewBox="0 0 1240 430"
            role="img"
            aria-label="일렉기타 프렛보드"
          ></svg>
        </div>

        <div id="quiz-feedback" class="feedback hidden">
          <button class="button button--success" type="button" data-assessment="correct">
            맞았어요
          </button>
          <button class="button button--warning" type="button" data-assessment="fuzzy">
            헷갈렸어요
          </button>
          <button class="button button--danger" type="button" data-assessment="wrong">
            틀렸어요
          </button>
        </div>

        <details class="advanced-panel">
          <summary>
            <span>고급 설정</span>
            <strong id="candidate-summary">0개 위치</strong>
          </summary>

          <div class="advanced-grid">
            <section class="advanced-section">
              <div class="action-bar__settings advanced-settings">
                <div class="slider-block">
                  <label class="control-row" for="interval-slider">
                    <span>간격</span>
                    <output id="interval-value" for="interval-slider">3.5초</output>
                  </label>
                  <input
                    id="interval-slider"
                    type="range"
                    min="1.5"
                    max="12"
                    step="0.5"
                    value="3.5"
                  />
                </div>

                <label class="inline-switch" for="sound-toggle">
                  <span>소리</span>
                  <input id="sound-toggle" type="checkbox" checked />
                </label>

                <label class="inline-select" for="fret-count-select">
                  <span>프렛</span>
                  <select id="fret-count-select" class="select-field">
                    <option value="22">22</option>
                    <option value="24">24</option>
                  </select>
                </label>
              </div>

              <label class="switch-row" for="card-alt-positions-toggle">
                <span>카드 모드에서 같은 음 다른 위치 표시</span>
                <input id="card-alt-positions-toggle" type="checkbox" checked />
              </label>
            </section>

            <section class="advanced-section">
              <div id="reveal-control" class="control-group">
                <label class="control-row" for="reveal-slider">
                  <span>정답 공개 시간</span>
                  <output id="reveal-value" for="reveal-slider">2.0초</output>
                </label>
                <input
                  id="reveal-slider"
                  type="range"
                  min="1"
                  max="10"
                  step="0.5"
                  value="2"
                />
              </div>

              <div class="double-field">
                <label class="field-box" for="min-fret-input">
                  <span>최소 프렛</span>
                  <input id="min-fret-input" type="number" min="0" max="24" step="1" value="0" />
                </label>
                <label class="field-box" for="max-fret-input">
                  <span>최대 프렛</span>
                  <input id="max-fret-input" type="number" min="0" max="24" step="1" value="22" />
                </label>
              </div>

              <label class="switch-row" for="open-string-toggle">
                <span>개방현 포함</span>
                <input id="open-string-toggle" type="checkbox" checked />
              </label>

              <div class="preset-row">
                <button class="button button--chip" type="button" data-range-preset="open">
                  개방현
                </button>
                <button class="button button--chip" type="button" data-range-preset="first-five">
                  1-5프렛
                </button>
                <button class="button button--chip" type="button" data-range-preset="first-twelve">
                  1-12프렛
                </button>
                <button class="button button--chip" type="button" data-range-preset="full">
                  전체
                </button>
              </div>
            </section>

            <section class="advanced-section">
              <div class="control-row control-row--stacked">
                <span>줄 선택</span>
                <div class="preset-row">
                  <button class="button button--chip" type="button" data-string-preset="all">
                    전체 줄
                  </button>
                  <button class="button button--chip" type="button" data-string-preset="low">
                    저음 줄
                  </button>
                  <button class="button button--chip" type="button" data-string-preset="high">
                    고음 줄
                  </button>
                </div>
              </div>
              <div id="string-filter-list" class="chip-grid"></div>
            </section>

            <section class="advanced-section">
              <div class="control-row control-row--stacked">
                <span>음 선택</span>
                <div class="preset-row">
                  <button class="button button--chip" type="button" data-note-preset="all">
                    전체 음
                  </button>
                  <button class="button button--chip" type="button" data-note-preset="natural">
                    기본음
                  </button>
                  <button class="button button--chip" type="button" data-note-preset="accidental">
                    반음만
                  </button>
                </div>
              </div>
              <div id="note-filter-list" class="chip-grid"></div>
            </section>
          </div>
        </details>

        <section class="support-stats visually-hidden" aria-hidden="true">
          <span id="hero-daily-rounds">0회</span>
          <span id="hero-candidate-count">0개</span>
          <span id="hero-streak-count">0일</span>
          <span id="today-rounds">0회</span>
          <span id="today-positions">0개</span>
          <span id="today-notes">0개</span>
          <span id="today-accuracy">아직 없음</span>
          <ul id="hard-note-list"></ul>
          <ul id="hard-position-list"></ul>
        </section>
      </main>
    </div>
    <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
